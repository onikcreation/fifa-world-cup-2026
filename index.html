<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 | Al Amin Onik</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#080d18;--navy:#0c1829;--blue:#003d7a;--gold:#c9a84c;--gold-light:#e8c96a;--green:#27ae60;--red:#e74c3c;--gray:#7f8fa4;--white:#eef2ff;--border:rgba(201,168,76,0.2);--card:rgba(12,24,41,0.95)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--white);font-family:'Barlow Condensed','Hind Siliguri',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 10% 0%,rgba(0,61,122,0.25) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.header{position:relative;z-index:10;background:linear-gradient(180deg,rgba(0,15,40,0.98) 0%,rgba(0,15,40,0.7) 100%);border-bottom:1px solid var(--border);padding:0 1.5rem}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;padding:1rem 0}
.header-logo{font-size:2.2rem;filter:drop-shadow(0 0 12px rgba(201,168,76,0.5))}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,3vw,2.2rem);letter-spacing:2px;color:var(--gold-light);line-height:1}
.header-sub{font-size:0.72rem;color:var(--gray);letter-spacing:1px;margin-top:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:0.8rem}
.live-badge{display:flex;align-items:center;gap:0.4rem;background:rgba(0,61,122,0.5);border:1px solid var(--border);border-radius:5px;padding:0.35rem 0.8rem;font-size:0.68rem;letter-spacing:1px;color:var(--gold)}
.dot{width:6px;height:6px;background:#2ecc71;border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.admin-link{font-size:0.7rem;letter-spacing:1px;padding:0.35rem 0.8rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:5px;color:var(--gray);text-decoration:none;transition:all 0.2s}
.admin-link:hover{border-color:var(--gold);color:var(--gold)}
.tabs{position:sticky;top:0;z-index:100;background:rgba(8,13,24,0.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--border);display:flex;padding:0 1.5rem;overflow-x:auto}
.tab{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;padding:0.9rem 1.5rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;margin-bottom:-2px}
.tab:hover{color:var(--white)}.tab.active{color:var(--gold-light);border-bottom-color:var(--gold)}
.main{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:1.5rem}
.tab-panel{display:none}.tab-panel.active{display:block}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--gold-light);margin-bottom:1.2rem;display:flex;align-items:center;gap:0.8rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.8rem;margin-bottom:1.5rem}
.stat-card{background:linear-gradient(135deg,var(--navy),rgba(0,61,122,0.2));border:1px solid var(--border);border-radius:8px;padding:0.9rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold-light);line-height:1}
.stat-lbl{font-size:0.65rem;letter-spacing:1px;color:var(--gray);margin-top:3px}
.filters{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.2rem}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:1px;padding:0.35rem 0.9rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:var(--gray);cursor:pointer;transition:all 0.2s}
.filter-btn:hover,.filter-btn.on{background:var(--blue);border-color:var(--gold);color:var(--white)}
.matches{display:flex;flex-direction:column;gap:0.5rem}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1.2rem;display:grid;grid-template-columns:110px 1fr auto 1fr 70px;align-items:center;gap:0.8rem;transition:all 0.2s}
.match-card:hover{border-color:rgba(201,168,76,0.5);background:rgba(0,61,122,0.15)}
.m-meta{display:flex;flex-direction:column;gap:2px}
.m-num{font-size:0.6rem;color:var(--gray);letter-spacing:1px}
.m-date{font-size:0.75rem;color:var(--white);font-weight:600}
.m-time{font-size:0.68rem;color:var(--gold)}
.m-grp{display:inline-block;font-size:0.58rem;padding:1px 5px;background:rgba(0,61,122,0.5);border:1px solid var(--border);border-radius:3px;color:var(--gold-light);letter-spacing:1px;width:fit-content;margin-top:1px}
.m-team{display:flex;flex-direction:column}.m-team.right{text-align:right;align-items:flex-end}
.m-tname{font-size:0.85rem;font-weight:700}
.m-score{display:flex;align-items:center;justify-content:center;gap:0.4rem}
.score-box{width:32px;height:32px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.2rem}
.score-box.played{background:rgba(0,61,122,0.3);border-color:var(--border)}
.score-sep{font-size:0.65rem;color:var(--gray)}
.m-status{text-align:center;font-size:0.62rem;letter-spacing:1px}
.st-done{color:var(--gold)}.st-wait{color:var(--gray)}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
.grp-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.grp-head{background:linear-gradient(135deg,var(--blue),#002860);padding:0.6rem 1rem;display:flex;align-items:center;gap:0.6rem;border-bottom:1px solid var(--border)}
.grp-letter{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold-light);line-height:1;text-shadow:0 0 20px rgba(201,168,76,0.4)}
.grp-lbl{font-size:0.65rem;color:var(--gray);letter-spacing:1px}
.grp-tbl{width:100%;border-collapse:collapse;font-size:0.8rem}
.grp-tbl th{padding:0.45rem 0.5rem;text-align:center;font-size:0.6rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,0.25);border-bottom:1px solid rgba(255,255,255,0.05)}
.grp-tbl th:first-child{text-align:left;padding-left:0.8rem}
.grp-tbl td{padding:0.5rem 0.5rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.grp-tbl td:first-child{text-align:left;padding-left:0.8rem}
.grp-tbl tbody tr:last-child td{border-bottom:none}
.grp-tbl tbody tr:hover{background:rgba(255,255,255,0.03)}
.rank-badge{display:inline-block;width:17px;height:17px;background:rgba(255,255,255,0.07);border-radius:3px;text-align:center;line-height:17px;font-size:0.65rem;color:var(--gray);margin-right:5px}
.row-q{background:rgba(39,174,96,0.07)!important}.row-q td:first-child{border-left:3px solid var(--green)}
.row-3{background:rgba(243,156,18,0.05)!important}.row-3 td:first-child{border-left:3px solid #f39c12}
.pts{font-weight:700;color:var(--gold-light);font-size:0.9rem}
.gd-p{color:var(--green)}.gd-n{color:var(--red)}.gd-z{color:var(--gray)}
.bracket-wrap{overflow-x:auto;padding-bottom:1rem}
.bracket{display:flex;gap:0.8rem;min-width:1100px;align-items:flex-start}
.b-round{flex:1;min-width:165px}
.b-round-title{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:2px;color:var(--gold);text-align:center;padding:0.6rem;background:rgba(0,61,122,0.3);border:1px solid var(--border);border-radius:6px 6px 0 0;margin-bottom:0.4rem}
.b-matches{display:flex;flex-direction:column;gap:0.4rem;padding:0.4rem}
.b-match{background:var(--navy);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all 0.2s}
.b-match:hover{border-color:var(--gold)}
.b-team{display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0.6rem;font-size:0.75rem;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s}
.b-team:last-of-type{border-bottom:none}
.b-team:hover{background:rgba(255,255,255,0.03)}
.b-tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.b-score{font-family:'Bebas Neue',sans-serif;font-size:0.95rem;color:var(--gold-light);min-width:20px;text-align:right}
.b-date{text-align:center;font-size:0.58rem;color:var(--gray);padding:3px;background:rgba(0,0,0,0.2)}
.b-win{background:rgba(39,174,96,0.1)!important;font-weight:700}
.tp-card{background:var(--navy);border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:1.2rem}
.tp-table{width:100%;border-collapse:collapse;font-size:0.82rem}
.tp-table th{padding:0.5rem 0.7rem;text-align:center;font-size:0.62rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.05)}
.tp-table th:first-child,.tp-table th:nth-child(2){text-align:left}
.tp-table td{padding:0.5rem 0.7rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.tp-table td:first-child,.tp-table td:nth-child(2){text-align:left}
.tp-table tbody tr:hover{background:rgba(255,255,255,0.03)}
.loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999;transition:opacity 0.5s}
.loading.gone{opacity:0;pointer-events:none}
.loading-icon{font-size:3.5rem;animation:float 1.2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.loading-txt{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--gold);font-size:1rem}
.loading-bar{width:180px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));animation:ld 1.5s infinite}
@keyframes ld{0%{width:0}100%{width:100%}}
.info-bar{background:rgba(0,61,122,0.15);border:1px solid var(--border);border-radius:7px;padding:0.7rem 1.2rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:0.8rem;font-size:0.78rem;color:var(--gray);flex-wrap:wrap}
.info-bar strong{color:var(--gold-light)}
.refresh-btn{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1px;padding:0.35rem 0.9rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:var(--white);cursor:pointer;transition:all 0.2s}
.refresh-btn:hover{background:#004d9a}
@media(max-width:700px){.match-card{grid-template-columns:1fr;gap:0.4rem}.m-score{justify-content:flex-start}.groups-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loading" id="loader">
  <div class="loading-icon">🏆</div>
  <div class="loading-txt">লোড হচ্ছে...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>
<header class="header">
  <div class="header-inner">
    <div class="header-logo">🏆</div>
    <div>
      <div class="header-title">FIFA WORLD CUP 2026</div>

</header>
<nav class="tabs">

  <button class="tab" onclick="switchTab('knockout',this)">🏅 Knockout</button>

</nav>
<main class="main">

  <div id="p-schedule" class="tab-panel active">

  </div>
</main>
<script type="module">

function calcGroups(){
  const t={};
  for(const[g,teams]of Object.entries(GROUPS)){t[g]={};for(const tm of teams)t[g][tm]={pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};}
  for(const m of MATCHES){
    const sc=scores[m.id];
    if(!sc||sc.s1===null||sc.s1===undefined)continue;
    const tbl=t[m.grp];if(!tbl||!tbl[m.t1]||!tbl[m.t2])continue;
    const s1=Number(sc.s1),s2=Number(sc.s2);
    tbl[m.t1].pl++;tbl[m.t2].pl++;tbl[m.t1].gf+=s1;tbl[m.t1].ga+=s2;tbl[m.t2].gf+=s2;tbl[m.t2].ga+=s1;
    if(s1>s2){tbl[m.t1].w++;tbl[m.t1].pts+=3;tbl[m.t2].l++;}
    else if(s1<s2){tbl[m.t2].w++;tbl[m.t2].pts+=3;tbl[m.t1].l++;}
    else{tbl[m.t1].d++;tbl[m.t1].pts++;tbl[m.t2].d++;tbl[m.t2].pts++;}
  }
  const s={};
  for(const[g,tbl]of Object.entries(t)){s[g]=Object.entries(tbl).map(([n,v])=>({name:n,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);}
  return s;
}

window.fG=function(g){activeF=g;renderFilters();renderMatches(g);};
function renderMatches(grp){
  const list=grp==='ALL'?MATCHES:MATCHES.filter(m=>m.grp===grp);
  document.getElementById('matchList').innerHTML=list.map(m=>{
    const sc=scores[m.id];const done=sc&&sc.s1!==undefined&&sc.s1!==null;
    return`<div class="match-card"><div class="m-meta"><span class="m-num">MATCH #${m.id}</span><span class="m-date">${m.date}, 2026</span><span class="m-time">⏰ ${m.time} GMT+6</span><span class="m-grp">GROUP ${m.grp}</span></div><div class="m-team"><span class="m-tname">${m.t1}</span></div><div class="m-score"><div class="score-box ${done?'played':''}">${done?sc.s1:'–'}</div><span class="score-sep">VS</span><div class="score-box ${done?'played':''}">${done?sc.s2:'–'}</div></div><div class="m-team right"><span class="m-tname">${m.t2}</span></div><div class="m-status"><span class="${done?'st-done':'st-wait'}">${done?'✓ শেষ':'⏳ বাকি'}</span></div></div>`;
  }).join('');
}
function renderGroups(g){
  document.getElementById('groupsGrid').innerHTML=Object.entries(g).map(([gr,teams])=>`<div class="grp-card"><div class="grp-head"><div class="grp-letter">${gr}</div><div><div style="font-size:0.7rem;color:var(--gold)">GROUP ${gr}</div><div class="grp-lbl">গ্রুপ ${gr}</div></div></div><table class="grp-tbl"><thead><tr><th>দল</th><th>খে</th><th>জ</th><th>ড্র</th><th>হা</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>${teams.map((t,i)=>`<tr class="${i<2?'row-q':i===2?'row-3':''}"><td><span class="rank-badge">${i+1}</span>${t.name}</td><td>${t.pl}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gf}</td><td>${t.ga}</td><td class="${t.gd>0?'gd-p':t.gd<0?'gd-n':'gd-z'}">${t.gd>0?'+'+t.gd:t.gd}</td><td class="pts">${t.pts}</td></tr>`).join('')}</tbody></table></div>`).join('');
}
function renderKO(){
  document.getElementById('bracket').innerHTML=KO.map(r=>`<div class="b-round"><div class="b-round-title">${r.name}</div><div class="b-matches">${r.ms.map(m=>{const sc=scores[m.id];const done=sc&&sc.s1!==undefined;const t1=sc?.t1||m.s1;const t2=sc?.t2||m.s2;return`<div class="b-match"><div class="b-team ${done&&Number(sc.s1)>Number(sc.s2)?'b-win':''}"><span class="b-tname">${t1}</span><span class="b-score">${done?sc.s1:''}</span></div><div class="b-team ${done&&Number(sc.s2)>Number(sc.s1)?'b-win':''}"><span class="b-tname">${t2}</span><span class="b-score">${done?sc.s2:''}</span></div><div class="b-date">${m.date} · ${m.time}</div></div>`;}).join('')}</div></div>`).join('');
}
function renderTP(g){
  const thirds=Object.entries(g).map(([gr,teams])=>({...teams[2],group:gr})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  document.getElementById('thirdPlace').innerHTML=`<div class="tp-card"><p style="font-size:0.78rem;color:var(--gray);margin-bottom:1rem;">১২টি গ্রুপের ৩য় স্থানের দলের মধ্যে সেরা ৮টি শেষ বত্রিশে যাবে।</p><table class="tp-table"><thead><tr><th>#</th><th>দল</th><th>গ্রুপ</th><th>খে</th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th><th>মর্যাদা</th></tr></thead><tbody>${thirds.map((t,i)=>`<tr class="${i<8?'row-q':''}"><td>${i+1}</td><td>${t.name}</td><td><span class="m-grp">GRP ${t.group}</span></td><td>${t.pl}</td><td class="pts">${t.pts}</td><td>${t.gf}</td><td>${t.ga}</td><td class="${t.gd>0?'gd-p':t.gd<0?'gd-n':'gd-z'}">${t.gd>0?'+'+t.gd:t.gd}</td><td style="font-size:0.72rem;color:${i<8?'var(--green)':'var(--gray)'}">${i<8?'✓ উত্তীর্ণ':'✗ বাদ'}</td></tr>`).join('')}</tbody></table></div>`;
}
window.switchTab=function(id,btn){document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('p-'+id).classList.add('active');btn.classList.add('active');};
function hideLoader(){setTimeout(()=>{const l=document.getElementById('loader');l.classList.add('gone');setTimeout(()=>l.remove(),500);},700);}
</script>
</body>
</html>
