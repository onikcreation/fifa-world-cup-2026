<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>২০২৬ ফিফা বিশ্বকাপ | Al Amin Onik</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --fifa-dark: #0a0e1a;
  --fifa-navy: #0d1b2e;
  --fifa-blue: #003d7a;
  --fifa-gold: #c9a84c;
  --fifa-gold-light: #e8c96a;
  --fifa-red: #c0392b;
  --fifa-green: #27ae60;
  --fifa-white: #f0f4ff;
  --fifa-gray: #8892a4;
  --fifa-border: rgba(201,168,76,0.25);
  --cell-bg: rgba(255,255,255,0.04);
  --header-bg: rgba(0,61,122,0.6);
  --win-color: #27ae60;
  --draw-color: #f39c12;
  --lose-color: #c0392b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--fifa-dark);
  color: var(--fifa-white);
  font-family: 'Barlow Condensed', 'Tiro Bangla', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(0,61,122,0.3) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.1) 0%, transparent 60%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.01) 60px,
      rgba(255,255,255,0.01) 61px
    );
  pointer-events: none;
  z-index: 0;
}

/* ===== HEADER ===== */
.site-header {
  position: relative;
  z-index: 10;
  background: linear-gradient(180deg, rgba(0,20,50,0.95) 0%, transparent 100%);
  border-bottom: 1px solid var(--fifa-border);
  padding: 0 2rem;
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1.2rem 0;
}

.trophy-icon {
  font-size: 2.5rem;
  filter: drop-shadow(0 0 12px rgba(201,168,76,0.6));
}

.header-text h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  letter-spacing: 2px;
  color: var(--fifa-gold-light);
  line-height: 1;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
}

.header-text p {
  font-size: 0.75rem;
  color: var(--fifa-gray);
  letter-spacing: 1px;
  margin-top: 2px;
}

.header-badge {
  margin-left: auto;
  background: linear-gradient(135deg, var(--fifa-blue), #002855);
  border: 1px solid var(--fifa-border);
  border-radius: 6px;
  padding: 0.4rem 0.9rem;
  font-size: 0.7rem;
  letter-spacing: 1px;
  color: var(--fifa-gold);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.live-dot {
  width: 7px; height: 7px;
  background: #27ae60;
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* ===== NAV TABS ===== */
.nav-tabs {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,14,26,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 2px solid var(--fifa-border);
  display: flex;
  padding: 0 2rem;
  gap: 0;
  overflow-x: auto;
}

.tab-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 2px;
  color: var(--fifa-gray);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 1rem 1.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  margin-bottom: -2px;
}

.tab-btn:hover { color: var(--fifa-white); }
.tab-btn.active {
  color: var(--fifa-gold-light);
  border-bottom-color: var(--fifa-gold);
}

/* ===== MAIN CONTENT ===== */
.main {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== SECTION TITLE ===== */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 3px;
  color: var(--fifa-gold-light);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--fifa-gold), transparent);
}

/* ===== GROUP TABLES ===== */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.group-card {
  background: var(--fifa-navy);
  border: 1px solid var(--fifa-border);
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.group-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.group-header {
  background: linear-gradient(135deg, var(--fifa-blue), #00306a);
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--fifa-border);
}

.group-letter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--fifa-gold-light);
  line-height: 1;
  text-shadow: 0 0 20px rgba(201,168,76,0.5);
}

.group-label {
  font-size: 0.7rem;
  color: var(--fifa-gray);
  letter-spacing: 1px;
}

.group-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.group-table thead tr {
  background: rgba(0,0,0,0.3);
}

.group-table th {
  padding: 0.5rem 0.6rem;
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 1px;
  color: var(--fifa-gray);
  font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.group-table th:first-child { text-align: left; padding-left: 0.8rem; }

.group-table td {
  padding: 0.55rem 0.6rem;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}

.group-table td:first-child {
  text-align: left;
  padding-left: 0.8rem;
}

.group-table tbody tr:hover { background: rgba(255,255,255,0.04); }
.group-table tbody tr:last-child td { border-bottom: none; }

.team-rank {
  display: inline-block;
  width: 18px; height: 18px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  text-align: center;
  line-height: 18px;
  font-size: 0.7rem;
  color: var(--fifa-gray);
  margin-right: 6px;
}

.team-name-cell { font-weight: 600; }

.qualified { background: rgba(39,174,96,0.08) !important; }
.qualified td:first-child { border-left: 3px solid var(--fifa-green); }
.third-place { background: rgba(243,156,18,0.06) !important; }
.third-place td:first-child { border-left: 3px solid #f39c12; }

.pts-cell {
  font-weight: 700;
  color: var(--fifa-gold-light);
  font-size: 0.95rem;
}

.gd-pos { color: var(--fifa-green); }
.gd-neg { color: var(--fifa-red); }
.gd-zero { color: var(--fifa-gray); }

/* ===== MATCH SCHEDULE ===== */
.schedule-filters {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.filter-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 1px;
  padding: 0.4rem 1rem;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  color: var(--fifa-gray);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.filter-btn:hover, .filter-btn.active {
  background: var(--fifa-blue);
  border-color: var(--fifa-gold);
  color: var(--fifa-white);
}

.matches-list { display: flex; flex-direction: column; gap: 0.6rem; }

.match-card {
  background: var(--fifa-navy);
  border: 1px solid var(--fifa-border);
  border-radius: 8px;
  padding: 0.8rem 1.2rem;
  display: grid;
  grid-template-columns: 120px 1fr auto 1fr 80px;
  align-items: center;
  gap: 1rem;
  transition: all 0.2s;
}

.match-card:hover {
  border-color: var(--fifa-gold);
  background: rgba(0,61,122,0.2);
}

.match-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.match-num {
  font-size: 0.65rem;
  color: var(--fifa-gray);
  letter-spacing: 1px;
}

.match-date {
  font-size: 0.78rem;
  color: var(--fifa-white);
  font-weight: 600;
}

.match-time {
  font-size: 0.72rem;
  color: var(--fifa-gold);
}

.match-group-badge {
  display: inline-block;
  font-size: 0.6rem;
  padding: 2px 6px;
  background: rgba(0,61,122,0.6);
  border: 1px solid var(--fifa-border);
  border-radius: 3px;
  color: var(--fifa-gold-light);
  letter-spacing: 1px;
  margin-top: 2px;
  width: fit-content;
}

.match-team {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.match-team.right { text-align: right; align-items: flex-end; }

.team-name {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--fifa-white);
}

.team-flag { font-size: 1.1rem; }

.match-score {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.score-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  width: 34px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: var(--fifa-white);
}

.score-vs {
  font-size: 0.7rem;
  color: var(--fifa-gray);
  letter-spacing: 1px;
}

.score-played .score-box { 
  border-color: var(--fifa-border);
  background: rgba(0,61,122,0.3);
}

.match-status {
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 1px;
}

.status-upcoming { color: var(--fifa-gray); }
.status-live { color: #2ecc71; animation: pulse 1s infinite; }
.status-finished { color: var(--fifa-gold); }

/* ===== KNOCKOUT BRACKET ===== */
.bracket-container {
  overflow-x: auto;
  padding-bottom: 1rem;
}

.bracket-wrapper {
  display: flex;
  gap: 0;
  min-width: 1200px;
  align-items: flex-start;
}

.bracket-round {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 180px;
}

.round-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  color: var(--fifa-gold);
  text-align: center;
  padding: 0.8rem;
  background: rgba(0,61,122,0.3);
  border: 1px solid var(--fifa-border);
  border-radius: 6px 6px 0 0;
  margin-bottom: 0.5rem;
}

.round-matches {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  flex: 1;
  gap: 0.5rem;
  padding: 0.5rem;
}

.bracket-match {
  background: var(--fifa-navy);
  border: 1px solid var(--fifa-border);
  border-radius: 6px;
  overflow: hidden;
  transition: all 0.2s;
}

.bracket-match:hover {
  border-color: var(--fifa-gold);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.bracket-team {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.45rem 0.7rem;
  font-size: 0.78rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}

.bracket-team:last-child { border-bottom: none; }
.bracket-team:hover { background: rgba(255,255,255,0.04); }

.bracket-team-name { 
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bracket-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  min-width: 24px;
  text-align: right;
  color: var(--fifa-gold-light);
}

.bracket-match-date {
  text-align: center;
  font-size: 0.6rem;
  color: var(--fifa-gray);
  padding: 3px;
  background: rgba(0,0,0,0.2);
  border-top: 1px solid rgba(255,255,255,0.04);
}

.bracket-winner { background: rgba(39,174,96,0.12) !important; font-weight: 700; }

/* ===== LOADING STATE ===== */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--fifa-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  z-index: 9999;
  transition: opacity 0.5s;
}

.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loading-trophy {
  font-size: 4rem;
  animation: bounce 1s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.loading-text {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 3px;
  color: var(--fifa-gold);
  font-size: 1.1rem;
}

.loading-bar {
  width: 200px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}

.loading-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--fifa-gold), var(--fifa-gold-light));
  animation: load 1.5s infinite;
}

@keyframes load {
  0% { width: 0%; }
  100% { width: 100%; }
}

/* ===== DATA SOURCE INFO ===== */
.data-source-info {
  background: rgba(0,61,122,0.2);
  border: 1px solid var(--fifa-border);
  border-radius: 8px;
  padding: 1rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  font-size: 0.8rem;
  color: var(--fifa-gray);
}

.data-source-info strong { color: var(--fifa-gold-light); }

.refresh-btn {
  margin-left: auto;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 1px;
  padding: 0.4rem 1rem;
  background: var(--fifa-blue);
  border: 1px solid var(--fifa-border);
  border-radius: 5px;
  color: var(--fifa-white);
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover { background: #004d9a; }

/* ===== THIRD PLACE ===== */
.third-place-section {
  background: var(--fifa-navy);
  border: 1px solid var(--fifa-border);
  border-radius: 10px;
  padding: 1.5rem;
  margin-top: 2rem;
}

.third-place-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 2px;
  color: #f39c12;
  margin-bottom: 1rem;
}

.third-place-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.5rem;
}

.third-team-card {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(243,156,18,0.2);
  border-radius: 6px;
  padding: 0.6rem;
  text-align: center;
  font-size: 0.75rem;
}

.third-team-pts {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: #f39c12;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .main { padding: 1rem; }
  
  .match-card {
    grid-template-columns: 1fr;
    gap: 0.5rem;
  }
  
  .groups-grid {
    grid-template-columns: 1fr;
  }
}

/* ===== ERROR STATE ===== */
.error-box {
  background: rgba(192,57,43,0.1);
  border: 1px solid rgba(192,57,43,0.4);
  border-radius: 8px;
  padding: 1.5rem;
  text-align: center;
  color: var(--fifa-white);
}

.error-box h3 { color: #e74c3c; margin-bottom: 0.5rem; }

/* ===== STATS ===== */
.stat-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: linear-gradient(135deg, var(--fifa-navy), rgba(0,61,122,0.3));
  border: 1px solid var(--fifa-border);
  border-radius: 8px;
  padding: 1rem;
  text-align: center;
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: var(--fifa-gold-light);
  line-height: 1;
}

.stat-label {
  font-size: 0.68rem;
  letter-spacing: 1px;
  color: var(--fifa-gray);
  margin-top: 4px;
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-trophy">🏆</div>
  <div class="loading-text">ডেটা লোড হচ্ছে...</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- Header -->
<header class="site-header">
  <div class="header-inner">
    <div class="trophy-icon">🏆</div>
    <div class="header-text">
      <h1>FIFA WORLD CUP 2026</h1>
      <p>২০২৬ ফিফা বিশ্বকাপ টুর্নামেন্ট সূচি • Al Amin Onik</p>
    </div>
    <div class="header-badge">
      <div class="live-dot"></div>
      <span>LIVE TRACKER</span>
    </div>
  </div>
</header>

<!-- Navigation -->
<nav class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('schedule')">📅 ম্যাচ সূচি</button>
  <button class="tab-btn" onclick="switchTab('groups')">📊 গ্রুপ টেবিল</button>
  <button class="tab-btn" onclick="switchTab('knockout')">🏅 নকআউট</button>
  <button class="tab-btn" onclick="switchTab('thirdplace')">🥉 তৃতীয় স্থান</button>
</nav>

<!-- Main Content -->
<main class="main">

  <!-- Data Source Info -->
  <div class="data-source-info">
    <span>📡</span>
    <span>ডেটা সোর্স: <strong id="dataSourceLabel">লোড হচ্ছে...</strong></span>
    <span id="lastUpdated" style="margin-left:auto;margin-right:1rem;font-size:0.72rem;"></span>
    <button class="refresh-btn" onclick="loadData()">🔄 রিফ্রেশ</button>
  </div>

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" class="tab-content active">
    <div class="stat-cards" id="statCards"></div>
    <h2 class="section-title">ম্যাচ সূচি</h2>
    <div class="schedule-filters" id="scheduleFilters"></div>
    <div class="matches-list" id="matchesList"></div>
  </div>

  <!-- GROUPS TAB -->
  <div id="tab-groups" class="tab-content">
    <h2 class="section-title">গ্রুপ পর্যায়</h2>
    <div class="groups-grid" id="groupsGrid"></div>
  </div>

  <!-- KNOCKOUT TAB -->
  <div id="tab-knockout" class="tab-content">
    <h2 class="section-title">নকআউট রাউন্ড</h2>
    <div class="bracket-container">
      <div class="bracket-wrapper" id="knockoutBracket"></div>
    </div>
  </div>

  <!-- THIRD PLACE TAB -->
  <div id="tab-thirdplace" class="tab-content">
    <h2 class="section-title">তৃতীয় স্থান নির্ধারণী</h2>
    <div id="thirdPlaceContent"></div>
  </div>

</main>

<script>
// ============================================================
//  CONFIG — Google Sheets থেকে ডেটা নেওয়ার জন্য এখানে পরিবর্তন করো
// ============================================================
const CONFIG = {
  // Google Sheets Published CSV URL
  // File → Share → Publish to web → CSV format → link paste করো
  SHEETS_CSV_URL: '',  // এখানে তোমার Google Sheets CSV URL দাও
  
  // Fallback: Static data (Sheets URL না থাকলে এটা ব্যবহার হবে)
  USE_STATIC_FALLBACK: true,
};

// ============================================================
//  STATIC DATA (Excel থেকে এক্সট্র্যাক্ট করা)
// ============================================================
const STATIC_DATA = {
  groups: {
    'A': {

// ============================================================
//  STATE
// ============================================================
let appData = null;
let activeGroupFilter = 'ALL';

// ============================================================
//  LOAD DATA
// ============================================================
async function loadData() {
  try {
    if (CONFIG.SHEETS_CSV_URL) {
      document.getElementById('dataSourceLabel').textContent = 'Google Sheets থেকে লোড হচ্ছে...';
      const resp = await fetch(CONFIG.SHEETS_CSV_URL);
      if (resp.ok) {
        const csv = await resp.text();
        appData = parseGoogleSheetsCSV(csv);
        document.getElementById('dataSourceLabel').innerHTML = '<strong style="color:var(--fifa-green)">✓ Google Sheets (Live)</strong>';
      } else {
        throw new Error('Sheets fetch failed');
      }
    } else {
      throw new Error('No URL configured');
    }
  } catch(e) {
    appData = JSON.parse(JSON.stringify(STATIC_DATA));
    document.getElementById('dataSourceLabel').innerHTML = 
      CONFIG.SHEETS_CSV_URL 
        ? '<strong style="color:var(--fifa-red)">✗ Sheets ব্যর্থ — Static Data ব্যবহার হচ্ছে</strong>'
        : '<strong style="color:var(--fifa-gold)">Static Data (Google Sheets URL সেট করুন)</strong>';
  }

  // Calculate group standings from match results
  calculateGroupStandings();
  document.getElementById('lastUpdated').textContent = 'আপডেট: ' + new Date().toLocaleTimeString('bn-BD');
  renderAll();
  hideLoading();
}

function parseGoogleSheetsCSV(csv) {
  // Parse Google Sheets CSV format
  // Expected columns: match_id, s1, s2 (score1, score2)
  const lines = csv.trim().split('\n');
  const data = JSON.parse(JSON.stringify(STATIC_DATA));
  
  for(let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const matchId = parseInt(cols[0]);
    const s1 = cols[1] !== '' && cols[1] !== undefined ? parseInt(cols[1]) : null;
    const s2 = cols[2] !== '' && cols[2] !== undefined ? parseInt(cols[2]) : null;
    
    const match = data.matches.find(m => m.id === matchId);
    if(match) { match.s1 = s1; match.s2 = s2; }
  }
  return data;
}

// ============================================================
//  CALCULATE GROUP STANDINGS FROM MATCH RESULTS
// ============================================================
function calculateGroupStandings() {
  // Reset all team stats
  for(const grp in appData.groups) {
    for(const team of appData.groups[grp].teams) {
      team.pl = 0; team.w = 0; team.d = 0; team.l = 0;
      team.gf = 0; team.ga = 0; team.pts = 0;
    }
  }

  // Process group matches
  for(const m of appData.matches) {
    if(m.s1 === null || m.s2 === null) continue;
    if(!m.group) continue;

    const grp = appData.groups[m.group];
    if(!grp) continue;

    const t1 = grp.teams.find(t => t.name === m.team1);
    const t2 = grp.teams.find(t => t.name === m.team2);
    if(!t1 || !t2) continue;

    t1.pl++; t2.pl++;
    t1.gf += m.s1; t1.ga += m.s2;
    t2.gf += m.s2; t2.ga += m.s1;

    if(m.s1 > m.s2) { t1.w++; t1.pts+=3; t2.l++; }
    else if(m.s1 < m.s2) { t2.w++; t2.pts+=3; t1.l++; }
    else { t1.d++; t1.pts++; t2.d++; t2.pts++; }
  }

  // Sort each group
  for(const grp in appData.groups) {
    appData.groups[grp].teams.sort((a, b) => {
      if(b.pts !== a.pts) return b.pts - a.pts;
      const gdB = b.gf - b.ga, gdA = a.gf - a.ga;
      if(gdB !== gdA) return gdB - gdA;
      return b.gf - a.gf;
    });
  }
}

  const total = appData.matches.length;

  const totalGoals = appData.matches.reduce((sum, m) => sum + (m.s1||0) + (m.s2||0), 0);
  const upcoming = total - played;

  document.getElementById('statCards').innerHTML = `
    <div class="stat-card"><div class="stat-num">${played}</div><div class="stat-label">খেলা হয়েছে</div></div>
    <div class="stat-card"><div class="stat-num">${upcoming}</div><div class="stat-label">বাকি ম্যাচ</div></div>

        </thead>
        <tbody>
          ${thirdTeams.map((t, i) => {
            const gd = t.gf - t.ga;
            const qualified = i < 8;
            return `<tr class="${qualified ? 'qualified' : ''}">
              <td>${i+1}</td>
              <td class="team-name-cell">${t.name}</td>
              <td><span class="match-group-badge">গ্রুপ ${t.group}</span></td>
              <td>${t.pl}</td>
              <td class="pts-cell">${t.pts}</td>
              <td>${t.gf}</td>
              <td>${t.ga}</td>
              <td class="${gd>0?'gd-pos':gd<0?'gd-neg':'gd-zero'}">${gd>0?'+'+gd:gd}</td>
              <td style="font-size:0.75rem;color:${qualified?'var(--fifa-green)':'var(--fifa-gray)'}">
                ${qualified ? '✓ উত্তীর্ণ' : '✗ বাদ'}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    
    <div style="background:rgba(243,156,18,0.08);border:1px solid rgba(243,156,18,0.3);border-radius:8px;padding:1rem;font-size:0.8rem;color:var(--fifa-gray);">
      <strong style="color:#f39c12;">📋 নিয়ম:</strong> গ্রুপ পর্যায় শেষ হলে ১২টি গ্রুপের ৩য় স্থানের দলের মধ্যে সেরা ৮টি দল পয়েন্ট, গোল পার্থক্য এবং গোল করার ভিত্তিতে বাছাই করা হবে।
    </div>
  `;
}

// ============================================================
//  TAB SWITCHING
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function hideLoading() {
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
    setTimeout(() => document.getElementById('loadingOverlay').remove(), 500);
  }, 800);
}

// ============================================================
//  INIT
// ============================================================
loadData();
</script>
</body>
</html>
