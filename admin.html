<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | FIFA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--dark:#080d18;--navy:#0c1829;--blue:#003d7a;--gold:#c9a84c;--gold-light:#e8c96a;--green:#27ae60;--red:#e74c3c;--gray:#7f8fa4;--white:#eef2ff;--border:rgba(201,168,76,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--white);font-family:'Barlow Condensed',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,61,122,0.3) 0%,transparent 70%);pointer-events:none;z-index:0}

/* LOGIN SCREEN */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:var(--dark)}
.login-box{background:var(--navy);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.login-icon{font-size:3rem;margin-bottom:0.8rem;filter:drop-shadow(0 0 15px rgba(201,168,76,0.5))}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--gold-light);margin-bottom:0.3rem}
.login-sub{font-size:0.75rem;color:var(--gray);letter-spacing:1px;margin-bottom:2rem}
.pw-input{width:100%;padding:0.85rem 1rem;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:3px;text-align:center;outline:none;transition:border 0.2s;margin-bottom:1rem}
.pw-input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:0.85rem;background:linear-gradient(135deg,var(--blue),#002860);border:1px solid var(--border);border-radius:8px;color:var(--gold-light);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.login-btn:hover{background:linear-gradient(135deg,#004d9a,#003070)}
.login-err{color:var(--red);font-size:0.78rem;margin-top:0.8rem;display:none}
.login-err.show{display:block}

/* ADMIN PANEL */
.admin-wrap{display:none;position:relative;z-index:1}
.admin-wrap.show{display:block}
.admin-header{background:linear-gradient(180deg,rgba(0,15,40,0.98),transparent);border-bottom:1px solid var(--border);padding:0 1.5rem}
.admin-header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:1rem 0}
.admin-logo{font-size:1.8rem}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--gold-light)}
.admin-sub{font-size:0.68rem;color:var(--gray);letter-spacing:1px;margin-top:1px}
.admin-badges{margin-left:auto;display:flex;gap:0.6rem;align-items:center}
.badge-green{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.4);color:var(--green);padding:0.3rem 0.7rem;border-radius:5px;font-size:0.65rem;letter-spacing:1px}
.logout-btn{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);color:var(--red);padding:0.3rem 0.8rem;border-radius:5px;font-size:0.7rem;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
.logout-btn:hover{background:rgba(231,76,60,0.2)}

.main{max-width:1200px;margin:0 auto;padding:1.5rem}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;padding:0.8rem 1.5rem;border-radius:8px;font-size:0.85rem;letter-spacing:1px;z-index:999;transform:translateY(100px);opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:rgba(39,174,96,0.9);border:1px solid var(--green);color:#fff}
.toast.error{background:rgba(231,76,60,0.9);border:1px solid var(--red);color:#fff}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:0.7rem;margin-bottom:1.5rem}
.sbar-card{background:rgba(12,24,41,0.9);border:1px solid var(--border);border-radius:7px;padding:0.8rem;text-align:center}
.sbar-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold-light);line-height:1}
.sbar-lbl{font-size:0.6rem;letter-spacing:1px;color:var(--gray);margin-top:2px}

/* SECTION */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--gold-light);margin-bottom:1rem;display:flex;align-items:center;gap:0.7rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}

/* GROUP FILTER */
.gfilters{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1rem}
.gf-btn{font-size:0.75rem;letter-spacing:1px;padding:0.3rem 0.8rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:var(--gray);cursor:pointer;transition:all 0.2s}
.gf-btn:hover,.gf-btn.on{background:var(--blue);border-color:var(--gold);color:var(--white)}

/* MATCH TABLE */
.match-table{width:100%;border-collapse:collapse}
.match-table thead tr{background:rgba(0,61,122,0.3);border-bottom:2px solid var(--border)}
.match-table th{padding:0.6rem 0.8rem;text-align:left;font-size:0.65rem;letter-spacing:1.5px;color:var(--gray);white-space:nowrap}
.match-table th:nth-child(n+4){text-align:center}
.match-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.15s}
.match-table tbody tr:hover{background:rgba(255,255,255,0.03)}
.match-table td{padding:0.55rem 0.8rem;font-size:0.82rem;vertical-align:middle}
.match-table td:nth-child(n+4){text-align:center}
.m-id{font-size:0.65rem;color:var(--gray);font-weight:600}
.grp-tag{display:inline-block;font-size:0.6rem;padding:1px 5px;background:rgba(0,61,122,0.5);border:1px solid var(--border);border-radius:3px;color:var(--gold-light);letter-spacing:1px}
.score-in{width:42px;height:34px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.12);border-radius:5px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;text-align:center;outline:none;transition:border 0.2s}
.score-in:focus{border-color:var(--gold)}
.score-in.filled{border-color:rgba(39,174,96,0.5);background:rgba(39,174,96,0.08)}
.vsep{color:var(--gray);font-size:0.7rem;padding:0 4px}
.save-btn{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px;padding:0.35rem 0.9rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:var(--white);cursor:pointer;transition:all 0.2s;white-space:nowrap}
.save-btn:hover{background:#004d9a}
.save-btn.saving{background:rgba(243,156,18,0.3);border-color:#f39c12;color:#f39c12;pointer-events:none}
.save-btn.saved{background:rgba(39,174,96,0.2);border-color:var(--green);color:var(--green);pointer-events:none}
.clear-btn{font-size:0.75rem;padding:0.3rem 0.6rem;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:4px;color:var(--red);cursor:pointer;transition:all 0.2s}
.clear-btn:hover{background:rgba(231,76,60,0.2)}
.date-col{font-size:0.75rem;color:var(--gray)}
.bulk-save{display:flex;gap:0.8rem;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap}
.bulk-btn{font-family:'Bebas Neue',sans-serif;font-size:0.9rem;letter-spacing:1.5px;padding:0.55rem 1.4rem;border-radius:7px;cursor:pointer;transition:all 0.2s}
.bulk-save-btn{background:linear-gradient(135deg,var(--green),#1e8449);border:1px solid rgba(39,174,96,0.5);color:#fff}
.bulk-save-btn:hover{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.bulk-clear-btn{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.4);color:var(--red)}
.bulk-clear-btn:hover{background:rgba(231,76,60,0.2)}
.save-status{font-size:0.75rem;color:var(--gray);letter-spacing:1px}

/* KNOCKOUT ADMIN */
.ko-section{margin-top:2rem}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.ko-card{background:rgba(12,24,41,0.9);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ko-card-head{background:rgba(0,61,122,0.3);padding:0.5rem 0.9rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.ko-round-name{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1.5px;color:var(--gold)}
.ko-match-id{font-size:0.6rem;color:var(--gray)}
.ko-body{padding:0.8rem}
.ko-team-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}
.ko-team-input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:0.4rem 0.6rem;color:var(--white);font-size:0.78rem;outline:none;transition:border 0.2s}
.ko-team-input:focus{border-color:var(--gold)}
.ko-score-input{width:38px;height:30px;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--white);font-family:'Bebas Neue',sans-serif;font-size:1rem;text-align:center;outline:none;transition:border 0.2s}
.ko-score-input:focus{border-color:var(--gold)}
.ko-date{font-size:0.62rem;color:var(--gray);margin-bottom:0.6rem}
.ko-save-btn{width:100%;font-family:'Bebas Neue',sans-serif;font-size:0.85rem;letter-spacing:1px;padding:0.4rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:var(--white);cursor:pointer;transition:all 0.2s;margin-top:0.4rem}
.ko-save-btn:hover{background:#004d9a}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">ADMIN LOGIN</div>
    <div class="login-sub">FIFA WORLD CUP 2026 · Al Amin Onik</div>
    <input class="pw-input" type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">LOGIN →</button>
    <div class="login-err" id="loginErr">❌ ভুল Password! আবার চেষ্টা করুন</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-logo">⚙️</div>
      <div>
        <div class="admin-title">ADMIN PANEL</div>
        <div class="admin-sub">FIFA World Cup 2026 Score Manager</div>
      </div>
      <div class="admin-badges">
        <span class="badge-green" id="fbStatus">Firebase...</span>
        <a href="index.html" style="background:rgba(201,168,76,0.1);border:1px solid var(--border);color:var(--gold);padding:0.3rem 0.8rem;border-radius:5px;font-size:0.7rem;letter-spacing:1px;text-decoration:none;">🏠 সাইট দেখো</a>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Bulk Actions -->
    <div class="bulk-save">
      <button class="bulk-btn bulk-save-btn" onclick="saveAll()">💾 সব Save করো</button>
      <button class="bulk-btn bulk-clear-btn" onclick="confirmClearAll()">🗑️ সব Clear করো</button>
      <span class="save-status" id="saveStatus"></span>
    </div>

    <!-- Group Stage -->
    <div class="sec-title">গ্রুপ পর্যায় ম্যাচ স্কোর</div>
    <div class="gfilters" id="gfilters"></div>
    <div style="background:rgba(12,24,41,0.9);border:1px solid var(--border);border-radius:10px;overflow:hidden;overflow-x:auto;">
      <table class="match-table">
        <thead>
          <tr>
            <th>#</th><th>তারিখ</th><th>GRP</th>
            <th colspan="3">দল ১</th>
            <th></th>
            <th colspan="3">দল ২</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="matchTbody"></tbody>
      </table>
    </div>

    <!-- Knockout -->
    <div class="ko-section">
      <div class="sec-title">নকআউট রাউন্ড</div>
      <div class="ko-grid" id="koGrid"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{FIREBASE_CONFIG,ADMIN_PASSWORD}from'./firebase-config.js';

const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);

// ── PASSWORD LOGIN ──────────────────────────
window.tryLogin=function(){
  const pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PASSWORD){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').classList.add('show');
    sessionStorage.setItem('fifa_admin','1');
    initAdmin();
  } else {
    document.getElementById('loginErr').classList.add('show');
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>document.getElementById('loginErr').classList.remove('show'),3000);
  }
};

window.logout=function(){
  sessionStorage.removeItem('fifa_admin');
  document.getElementById('adminWrap').classList.remove('show');
  document.getElementById('loginWrap').style.display='flex';
};

// Auto-login if session exists
if(sessionStorage.getItem('fifa_admin')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminWrap').classList.add('show');
  initAdmin();
}

let dbScores={};
let activeGrpF='ALL';

function initAdmin(){
  const r=ref(db,'scores');
  onValue(r,snap=>{
    dbScores=snap.val()||{};
    document.getElementById('fbStatus').textContent='✓ Firebase Connected';
    document.getElementById('fbStatus').style.color='var(--green)';
    renderStats();
    renderTable(activeGrpF);
    renderKO();
  },()=>{
    document.getElementById('fbStatus').textContent='✗ Firebase Error';
    document.getElementById('fbStatus').style.color='var(--red)';
  });
  renderGFilters();
}

function renderStats(){
  const pl=MATCHES.filter(m=>dbScores[m.id]?.s1!==undefined).length;
  const gl=MATCHES.reduce((s,m)=>s+(dbScores[m.id]?Number(dbScores[m.id].s1||0)+Number(dbScores[m.id].s2||0):0),0);
  document.getElementById('statsBar').innerHTML=`
    <div class="sbar-card"><div class="sbar-num">${pl}</div><div class="sbar-lbl">স্কোর দেওয়া</div></div>
    <div class="sbar-card"><div class="sbar-num">${72-pl}</div><div class="sbar-lbl">বাকি</div></div>
    <div class="sbar-card"><div class="sbar-num">${gl}</div><div class="sbar-lbl">মোট গোল</div></div>
    <div class="sbar-card"><div class="sbar-num">72</div><div class="sbar-lbl">মোট ম্যাচ</div></div>`;
}

function renderGFilters(){
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('gfilters').innerHTML=gs.map(g=>
    `<button class="gf-btn ${activeGrpF===g?'on':''}" onclick="window.fGrp('${g}')">${g==='ALL'?'সকল':'Group '+g}</button>`
  ).join('');
}
window.fGrp=function(g){activeGrpF=g;renderGFilters();renderTable(g);};

function renderTable(grp){
  const list=grp==='ALL'?MATCHES:MATCHES.filter(m=>m.grp===grp);
  document.getElementById('matchTbody').innerHTML=list.map(m=>{
    const sc=dbScores[m.id]||{};
    const s1=sc.s1!==undefined?sc.s1:'';
    const s2=sc.s2!==undefined?sc.s2:'';
    return`<tr id="row-${m.id}">
      <td><span class="m-id">#${m.id}</span></td>
      <td class="date-col">${m.date} ${m.time}</td>
      <td><span class="grp-tag">${m.grp}</span></td>
      <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.t1}</td>
      <td><input class="score-in ${s1!==''?'filled':''}" type="number" min="0" max="30" id="s1_${m.id}" value="${s1}" placeholder="-" oninput="this.classList.toggle('filled',this.value!=='')"></td>
      <td><span class="vsep">VS</span></td>
      <td><input class="score-in ${s2!==''?'filled':''}" type="number" min="0" max="30" id="s2_${m.id}" value="${s2}" placeholder="-" oninput="this.classList.toggle('filled',this.value!=='')"></td>
      <td style="font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.t2}</td>
      <td>
        <div style="display:flex;gap:0.4rem;align-items:center">
          <button class="save-btn" id="sb_${m.id}" onclick="window.saveMatch(${m.id})">Save</button>
          <button class="clear-btn" onclick="window.clearMatch(${m.id})">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderKO(){
  document.getElementById('koGrid').innerHTML=KO_MATCHES.map(m=>{
    const sc=dbScores[m.id]||{};
    return`<div class="ko-card">
      <div class="ko-card-head">
        <span class="ko-round-name">${m.round}</span>
        <span class="ko-match-id">${m.id}</span>
      </div>
      <div class="ko-body">
        <div class="ko-date">📅 ${m.date} · ⏰ ${m.time}</div>
        <div class="ko-team-row">
          <input class="ko-team-input" id="kt1_${m.id}" placeholder="দল ১ নাম" value="${sc.t1||''}">
          <input class="ko-score-input" type="number" min="0" id="ks1_${m.id}" placeholder="-" value="${sc.s1!==undefined?sc.s1:''}">
        </div>
        <div class="ko-team-row">
          <input class="ko-team-input" id="kt2_${m.id}" placeholder="দল ২ নাম" value="${sc.t2||''}">
          <input class="ko-score-input" type="number" min="0" id="ks2_${m.id}" placeholder="-" value="${sc.s2!==undefined?sc.s2:''}">
        </div>
        <button class="ko-save-btn" onclick="window.saveKO('${m.id}')">💾 Save</button>
      </div>
    </div>`;
  }).join('');
}

// ── SAVE FUNCTIONS ──────────────────────────
window.saveMatch=async function(id){
  const s1v=document.getElementById('s1_'+id).value;
  const s2v=document.getElementById('s2_'+id).value;
  const btn=document.getElementById('sb_'+id);
  if(s1v===''||s2v===''){showToast('স্কোর দুটোই দিন!','error');return;}
  btn.textContent='Saving...';btn.className='save-btn saving';
  try{
    await set(ref(db,'scores/'+id),{s1:Number(s1v),s2:Number(s2v)});
    btn.textContent='✓ Saved';btn.className='save-btn saved';
    showToast(`Match #${id} → ${s1v} - ${s2v} সেভ হয়েছে ✓`,'success');
    setTimeout(()=>{btn.textContent='Save';btn.className='save-btn';},2000);
  }catch(e){btn.textContent='Save';btn.className='save-btn';showToast('সেভ ব্যর্থ হয়েছে!','error');}
};

window.clearMatch=async function(id){
  try{
    await set(ref(db,'scores/'+id),null);
    document.getElementById('s1_'+id).value='';
    document.getElementById('s2_'+id).value='';
    document.getElementById('s1_'+id).classList.remove('filled');
    document.getElementById('s2_'+id).classList.remove('filled');
    showToast(`Match #${id} clear হয়েছে`,'success');
  }catch(e){showToast('Clear ব্যর্থ!','error');}
};

window.saveKO=async function(id){
  const t1=document.getElementById('kt1_'+id).value;
  const t2=document.getElementById('kt2_'+id).value;
  const s1=document.getElementById('ks1_'+id).value;
  const s2=document.getElementById('ks2_'+id).value;
  const data={};
  if(t1)data.t1=t1;if(t2)data.t2=t2;
  if(s1!=='')data.s1=Number(s1);if(s2!=='')data.s2=Number(s2);
  if(!Object.keys(data).length){showToast('কিছু একটা দিন!','error');return;}
  try{
    await set(ref(db,'scores/'+id),data);
    showToast(`${id} সেভ হয়েছে ✓`,'success');
  }catch(e){showToast('সেভ ব্যর্থ!','error');}
};

window.saveAll=async function(){
  document.getElementById('saveStatus').textContent='সেভ হচ্ছে...';
  let count=0,errors=0;
  for(const m of MATCHES){
    const s1v=document.getElementById('s1_'+m.id)?.value;
    const s2v=document.getElementById('s2_'+m.id)?.value;
    if(s1v!==''&&s2v!==''&&s1v!==undefined){
      try{await set(ref(db,'scores/'+m.id),{s1:Number(s1v),s2:Number(s2v)});count++;}
      catch(e){errors++;}
    }
  }
  document.getElementById('saveStatus').textContent='';
  showToast(`${count}টি ম্যাচ সেভ হয়েছে${errors?` (${errors}টি ব্যর্থ)`:''}  ✓`,'success');
};

window.confirmClearAll=function(){
  if(confirm('⚠️ সব স্কোর মুছে ফেলবেন? এটা undo করা যাবে না!')){clearAll();}
};
async function clearAll(){
  try{
    await set(ref(db,'scores'),null);
    showToast('সব স্কোর clear হয়েছে','success');
  }catch(e){showToast('Clear ব্যর্থ!','error');}
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
