function log(msg,type='info-l'){
  const d=document.getElementById('log');
  d.innerHTML+=`<div class="${type}">${msg}</div>`;
  d.scrollTop=d.scrollHeight;
}

window.startUpload=async function(){
  const btn=document.getElementById('btn');
  const bar=document.getElementById('bar');
  const st=document.getElementById('status');
  btn.disabled=true;

  const entries=Object.entries(SQUADS);
  let done=0,errors=0;
  log(`শুরু: ${entries.length}টি দলের ডেটা upload হবে...`,'info-l');

  for(const[teamKey,data]of entries){
    try{
      const safeKey=teamKey.replace(/[.#$\[\]]/g,'_');
      await set(ref(db,'squads/'+safeKey),data);
      done++;
      const pct=Math.round(done/entries.length*100);
      bar.style.width=pct+'%';
      st.textContent=`${done}/${entries.length} (${pct}%) — ${data.group} · ${data.players.length} players`;
      log(`✓ Group ${data.group} — ${teamKey} (${data.players.length} জন)`,'ok');
    }catch(e){
      errors++;
      log(`✗ Error: ${teamKey} — ${e.message}`,'err');
    }
  }

  log('─'.repeat(50),'info-l');
  if(errors===0){
    const total=Object.values(SQUADS).reduce((s,v)=>s+v.players.length,0);
    log(`🎉 সফল! ${done}টি দেশ, ${total}জন খেলোয়াড় Firebase-এ গেছে`,'ok');
    st.textContent='✓ Upload সম্পন্ন! এখন এই ফাইলটি GitHub থেকে delete করো।';
    btn.textContent='✓ Upload Complete';
    btn.style.borderColor='#A1F000';
  }else{
    log(`⚠ ${done} সফল, ${errors} ব্যর্থ`,'err');
    st.textContent=`Done with ${errors} errors`;
    btn.textContent='⚠ Retry';
    btn.disabled=false;
  }
};
</script>
